name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Install project (editable)
        run: |
          pip install -e .

      - name: Basic import/version check
        run: |
          python -c "import sfogliatella; print(sfogliatella.__version__)"

      - name: Backward-compatible module entrypoints
        run: |
          python -m train --help
          python -m predict --help

      - name: Console script entrypoints
        run: |
          sfog-train --help
          sfog-predict --help

      - name: Build sdist and wheel
        run: |
          python -m build

      - name: Validate package metadata
        run: |
          twine check dist/*

      - name: Verify wheel install path
        run: |
          pip uninstall -y float16-sfogliatella || true
          python - <<'PY'
          import glob
          import subprocess
          import sys

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")
          subprocess.check_call([sys.executable, "-m", "pip", "install", wheels[0]])
          PY
          python -c "import sfogliatella; print(sfogliatella.__version__)"
